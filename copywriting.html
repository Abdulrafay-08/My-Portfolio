<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copywriting | Abdul Rafay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:white;padding:2rem;}
h1{text-align:center;margin-bottom:2rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;}
.card{background:#1a1a1a;padding:2rem;border-radius:15px;text-align:center;text-decoration:none;color:white;transition:0.3s;border:1px solid #2d2d2d;box-shadow:0 8px 20px rgba(0,0,0,0.3);}
.card i{font-size:2.5rem;color:#10b981;margin-bottom:1rem;display:block;}
.card h3{margin-bottom:0.5rem;}
.card p{color:#9ca3af;font-size:0.95rem;}
.card:hover{transform:translateY(-8px);border:1px solid #10b981;box-shadow:0 20px 40px rgba(16,185,129,0.3);}
.bar{height:8px;background:linear-gradient(90deg,#10b981,#34d399);border-radius:5px;margin-top:10px;}
.back{display:block;text-align:center;margin-top:2rem;color:#10b981;text-decoration:none;}
</style>
</head>
<body>

<h1>Copywriting Samples</h1>

<div class="grid">
  <a href="#" class="card">
    <i class="fas fa-pen-nib"></i>
    <h3>Landing Page Copy</h3>
    <p>Persuasive copywriting that converts visitors to customers.</p>
    <div class="bar" style="width:90%;"></div>
  </a>

  <a href="#" class="card">
    <i class="fas fa-pen-nib"></i>
    <h3>Ad Copy</h3>
    <p>High converting ad text for social media and Google Ads.</p>
    <div class="bar" style="width:85%;"></div>
  </a>

  <a href="#" class="card">
    <i class="fas fa-pen-nib"></i>
    <h3>Email Campaign Copy</h3>
    <p>Engaging emails to boost open rates and sales.</p>
    <div class="bar" style="width:80%;"></div>
  </a>
</div>

<a href="index.html" class="back">← Back to Home</a>

</body>
</html>
